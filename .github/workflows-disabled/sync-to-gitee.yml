name: Sync to Gitee

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync to Gitee
        uses: wearerequired/git-mirror-action@v1
        with:
          source-repo: "github.com/${{ github.repository }}"
          destination-repo: "gitee.com/wudijia2026/free-ai-router.git"
          ssh-private-key: ${{ secrets.GITEE_TOKEN }}
